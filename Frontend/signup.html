<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up | FraudGuard AI</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <link rel="stylesheet" href="webpage.css">
</head>
<body class="auth-body">

<canvas id="neural-canvas"></canvas>

<a href="webpage.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Home</a>

<div class="auth-card">
  <div class="auth-header">
    <i class="fa-solid fa-user-shield"></i>
    <h2>Create Account</h2>
    <p>Start detecting fraud today.</p>
  </div>

  <form id="signup-form">
    <div class="form-group">
      <label for="fullname">Full Name</label>
      <input type="text" id="fullname" placeholder="John Doe" required>
    </div>
    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="name@company.com" required>
    </div>
    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="Create a strong password" required>
    </div>
    <button type="submit" class="btn btn-primary btn-full">Create Account</button>
  </form>

  <div class="auth-footer">
    <p>Already a member? <a href="login.html">Login here</a></p>
  </div>
</div>

<script src="auth.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | FraudGuard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Orbitron:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="webpage.css">
</head>
<body class="auth-body">

<canvas id="neural-canvas"></canvas>

<a href="webpage.html" class="back-home"><i class="fa-solid fa-arrow-left"></i> Home</a>

<div class="auth-card">
    <div class="auth-header">
        <i class="fa-solid fa-fingerprint"></i>
        <h2>Welcome Back</h2>
        <p>Access your secure dashboard.</p>
    </div>

    <form id="login-form">
        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" placeholder="admin@fincorp.com" required>
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="••••••••" required>
        </div>
        <button type="submit" class="btn btn-primary btn-full">Sign In</button>
    </form>

    <div class="auth-footer">
        <p>Don't have an account? <a href="signup.html">Get Started</a></p>
    </div>
</div>

<script src="auth.js"></script>
</body>
</html>
